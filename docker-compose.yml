services:
  sync-portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${PORTAL_IMAGE:-sync-portal:latest}
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - PLEX_SERVER_URL=${PLEX_SERVER_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
    # To utilize hardware acceleration (GPU) on a compatible host (like Tower),
    # ensure NVIDIA Container Toolkit is installed and uncomment the block below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

